# About Project
about.title=About CrowdMapper
about.desc1=CrowdMapper is an innovative civic technology platform that harnesses the power of crowdsourcing to identify, verify, and resolve local civic issues. Our mission is to empower citizens and bridge the gap between communities and authorities.
about.desc2=The platform enables citizens to report problems (potholes, street lights, water leakage, etc.) with location and severity information. Community members verify these reports through voting, ensuring credibility. Advanced algorithms prioritize issues based on verification levels and severity, helping authorities allocate resources efficiently.

# Project Objectives
objectives.title=Project Objectives
objectives.1=Democratize civic issue reporting - Allow every citizen to voice problems in their locality
objectives.2=Ensure Credibility - Implement crowd-based verification to filter out false reports
objectives.3=Optimize Resolution - Prioritize issues based on community consensus and impact
objectives.4=Promote Transparency - Track problem resolution and measure municipal response rates
objectives.5=Enable Data-Driven Planning - Provide authorities with real-time civic data for better decision making

# How It Works - Detailed
howitworks.detailed=Our platform follows a 4-step process to efficiently manage civic issues:
howitworks.step1.title=STEP 1: Citizen Reports Problem
howitworks.step1.desc=Citizens download the CrowdMapper app, identify a civic issue (pothole, street light, water leakage, debris), attach photos, add location details, and select severity level (Low/Medium/High). The report is immediately submitted to the system.

howitworks.step2.title=STEP 2: Community Verification
howitworks.step2.desc=Other citizens receive in-app notifications about new reports nearby. They can vote to CONFIRM (I've seen this) or REJECT the report. A report needs minimum 60% confirmation votes to be marked as VERIFIED. This crowd-based approach ensures only valid issues are processed.

howitworks.step3.title=STEP 3: AI-Powered Prioritization
howitworks.step3.desc=Our system calculates urgency scores using: Verification percentage (votes), Severity level, Number of confirmations, Geolocation clustering. High-priority verified issues are highlighted on the dashboard for municipal authorities.

howitworks.step4.title=STEP 4: Authority Action & Feedback
howitworks.step4.desc=Municipal authorities access the admin dashboard, filter issues by priority/category/location, assign teams, and update progress. Citizens receive notifications when their report is under review or resolved. Completion time metrics are tracked for performance analysis.

