<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - Crowd Mapper</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Leaflet.js — FREE, no API key needed -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 480px; width: 100%; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 2rem; z-index: 1; }
        .map-controls { display: flex; gap: 1rem; margin-bottom: 1rem; background: var(--card-bg); padding: 1rem; border-radius: var(--radius); box-shadow: var(--shadow); flex-wrap: wrap; }
        .tracking-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
        .location-card { padding: 1.5rem; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); border-left: 4px solid var(--primary-color); transition: transform 0.2s; }
        .location-card:hover { transform: translateY(-3px); }
        .crowded { border-left-color: var(--danger-color); }
        .normal { border-left-color: var(--success-color); }
        .progress-bar { width: 100%; background: rgba(0,0,0,0.1); border-radius: 10px; height: 10px; margin-bottom: 0.5rem; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; }
        .live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(46,204,113,0.15); color: var(--success-color); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; }
        .pulse-dot { width: 8px; height: 8px; background: var(--success-color); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.5; } }
    </style>
</head>
<body>
<div class="layout-wrapper">
    <aside class="sidebar">
        <a href="/" class="logo">CrowdMapper</a>
        <div class="sidebar-nav">
            <a href="/dashboard" class="sidebar-link"><span>📊</span> Dashboard</a>
            <a href="/live-tracking" class="sidebar-link active"><span>🗺️</span> Live Map</a>
            <a href="/report" class="sidebar-link"><span>📝</span> Report Issue</a>
            <a href="/my-complaints" class="sidebar-link"><span>📋</span> My Complaints</a>
            <a href="/qr-entry" class="sidebar-link"><span>🔲</span> QR Entry</a>
            <a href="/notifications" class="sidebar-link"><span>🔔</span> Notifications</a>
            <a href="/admin" class="sidebar-link" th:if="${isAdmin}"><span>🛠️</span> Admin Panel</a>
        </div>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 0.5rem;">
            <button id="theme-toggle" class="sidebar-link" style="width:100%; border:none; cursor:pointer; background:transparent; font-size:1rem;"><span>🌙</span> Dark Mode</button>
            <a href="/profile" class="sidebar-link"><span>👤</span> Profile</a>
            <a href="/logout" class="sidebar-link" style="color: var(--danger-color);"><span>🚪</span> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h1 style="font-size: 2rem; color: var(--primary-color); margin-bottom: 0.3rem;">🗺️ Live Map &amp; Crowd Tracking</h1>
                    <p style="color: var(--secondary-color);">Real-time crowd density and active complaints visualization.</p>
                </div>
                <span class="live-badge"><span class="pulse-dot"></span> Live Connected</span>
            </div>

            <!-- Map Controls -->
            <div class="map-controls">
                <select id="cityFilter" class="form-control" style="max-width: 200px;" onchange="filterLocations()">
                    <option value="ALL">All Cities</option>
                    <option value="Pune">Pune</option>
                    <option value="Mumbai">Mumbai</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Solapur">Solapur</option>
                </select>
                <button class="btn btn-primary" onclick="locateMe()">📍 My Location</button>
                <button class="btn btn-success" onclick="refreshData()">🔄 Refresh Data</button>
            </div>

            <!-- Leaflet Map -->
            <div id="map"></div>

            <!-- Crowd Density Cards -->
            <h2 style="margin-bottom: 1.5rem;">📊 Crowd Density Levels</h2>
            <div class="tracking-dashboard" id="locations-container"></div>
        </div>
    </main>
</div>

<script>
    // Initialize Leaflet map (FREE — no API key!)
    const map = L.map('map').setView([18.5204, 73.8567], 11);

    // OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
    }).addTo(map);

    // Mock crowd data — replace with API call as needed
    const allLocations = [
        { id:1, name:"City Center", lat:18.5204, lng:73.8567, current:850, max:1000, status:"Crowded", city:"Pune" },
        { id:2, name:"Tech Park",   lat:18.5679, lng:73.9143, current:300, max:1500, status:"Normal",  city:"Pune" },
        { id:3, name:"Shivaji Nagar", lat:18.5314, lng:73.8446, current:620, max:800, status:"Crowded", city:"Pune" },
        { id:4, name:"Gateway of India", lat:18.9220, lng:72.8347, current:450, max:500, status:"Crowded", city:"Mumbai" },
        { id:5, name:"Dadar",      lat:19.0176, lng:72.8562, current:250, max:800, status:"Normal",  city:"Mumbai" },
        { id:6, name:"Connaught Place", lat:28.6315, lng:77.2167, current:700, max:900, status:"Crowded", city:"Delhi" },
        { id:7, name:"Solapur Market", lat:17.6868, lng:75.9060, current:180, max:600, status:"Normal", city:"Solapur" },
    ];

    let markerGroup = L.layerGroup().addTo(map);

    function getMarkerColor(pct) { return pct > 80 ? 'red' : pct > 50 ? 'orange' : 'green'; }

    function renderMap(locations) {
        markerGroup.clearLayers();
        locations.forEach(loc => {
            const pct = Math.round((loc.current / loc.max) * 100);
            const color = getMarkerColor(pct);
            const icon = L.divIcon({
                className: '',
                html: `<div style="background:${color};width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>`,
                iconSize: [18, 18], iconAnchor: [9, 9]
            });
            const marker = L.marker([loc.lat, loc.lng], { icon })
                .bindPopup(`<b>${loc.name}</b><br>City: ${loc.city}<br>Capacity: ${loc.current}/${loc.max} (${pct}%)<br><b style="color:${color}">${loc.status}</b>`);
            markerGroup.addLayer(marker);
        });
    }

    function renderCards(locations) {
        const container = document.getElementById('locations-container');
        container.innerHTML = '';
        locations.forEach(loc => {
            const pct = Math.round((loc.current / loc.max) * 100);
            const isCrowded = pct > 70;
            const color = isCrowded ? 'var(--danger-color)' : 'var(--success-color)';
            container.innerHTML += `
                <div class="location-card ${isCrowded ? 'crowded' : 'normal'}">
                    <h3>${loc.name} <span style="font-size:0.75rem;color:var(--secondary-color);font-weight:400;">(${loc.city})</span></h3>
                    <p style="color:var(--secondary-color);font-size:0.9rem;margin:0.4rem 0 0.8rem;">People: ${loc.current} / ${loc.max}</p>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${pct}%; background:${color};"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <strong style="color:${color}">${isCrowded ? '🔥 High Crowd' : '✅ Safe Level'}</strong>
                        <span style="font-size:0.85rem;font-weight:700;color:${color}">${pct}%</span>
                    </div>
                </div>`;
        });
    }

    function filterLocations() {
        const city = document.getElementById('cityFilter').value;
        const filtered = city === 'ALL' ? allLocations : allLocations.filter(l => l.city === city);
        renderMap(filtered);
        renderCards(filtered);
        if (filtered.length > 0 && city !== 'ALL') map.setView([filtered[0].lat, filtered[0].lng], 13);
    }

    function locateMe() {
        if (!navigator.geolocation) return alert("Geolocation not supported");
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 15);
            L.marker([pos.coords.latitude, pos.coords.longitude])
                .addTo(map).bindPopup('📍 You are here!').openPopup();
        }, () => alert("Could not get your location."));
    }

    function refreshData() {
        // Simulate live update
        allLocations.forEach(l => {
            l.current = Math.max(10, Math.min(l.max, l.current + Math.floor(Math.random() * 40 - 20)));
            l.status = (l.current / l.max) > 0.7 ? 'Crowded' : 'Normal';
        });
        filterLocations();
        const btn = document.querySelector('[onclick="refreshData()"]');
        btn.textContent = '✅ Updated!';
        setTimeout(() => btn.textContent = '🔄 Refresh Data', 1500);
    }

    // Initial render
    filterLocations();
    // Auto-refresh every 30 seconds
    setInterval(refreshData, 30000);
</script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
