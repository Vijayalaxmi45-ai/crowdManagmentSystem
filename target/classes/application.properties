spring.application.name=crowd-mapper
# Render/Railway inject PORT at runtime; fallback to 8080 for local dev
server.port=${PORT:8080}

# H2 Database Configuration (file-based for persistence)
spring.datasource.url=jdbc:h2:file:/tmp/crowddb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (disabled in production for security)
spring.h2.console.enabled=false

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# Thymeleaf
spring.thymeleaf.cache=true

# Message Source Configuration (i18n)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
